{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark">
                <h3 class="mb-0">Editar Producto: {{ producto.nombre }}</h3>
            </div>
            <div class="card-body">
                <form method="POST" id="formEditarProducto">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label class="form-label">Nombre del Producto <span class="text-danger">*</span></label>
                        <input type="text" name="nombre" class="form-control" value="{{ producto.nombre }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Descripción <span class="text-danger">*</span></label>
                        <textarea name="descripcion" class="form-control" rows="2" required>{{ producto.descripcion }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Referencia <span class="text-danger">*</span></label>
                        <input type="text" name="referencia" class="form-control" value="{{ producto.referencia or '' }}" required>
                        <small class="text-muted">Código único de referencia del producto</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Ubicación en Almacén <span class="text-muted">(Opcional)</span></label>
                        <input type="text" name="ubicacion" class="form-control" value="{{ producto.ubicacion or '' }}">
                        <small class="text-muted">Dónde se encuentra físicamente</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Proveedor <span class="text-danger">*</span></label>
                        <select name="proveedor_id" class="form-select" required>
                            <option value="">-- Selecciona un proveedor --</option>
                            {% for prov in proveedores %}
                                <option value="{{ prov.id }}"
                                    {% if producto.proveedor_id == prov.id %}selected{% endif %}>
                                    {{ prov.nombre_empresa }}
                                    {% if prov.descuento > 0 %}
                                        (Descuento: {{ prov.descuento }}%)
                                    {% endif %}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Precio Coste (€) <span class="text-danger">*</span></label>
                            <input type="number" step="0.01" name="precio_coste" id="precio_coste_edit" class="form-control" value="{{ '%.2f'|format(producto.precio_coste) }}" min="0" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Precio Venta (€) <span class="text-danger">*</span></label>
                            <input type="number" step="0.01" name="precio_venta" id="precio_venta_edit" class="form-control" value="{{ '%.2f'|format(producto.precio_venta) }}" min="0" required>
                            <small class="text-danger" id="error_precio_edit" style="display:none;">Debe ser ≥ precio coste</small>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Stock Actual <span class="text-danger">*</span></label>
                            <input type="number" name="cantidad_actual" class="form-control" value="{{ producto.cantidad_actual }}" min="0" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Stock Máximo <span class="text-danger">*</span></label>
                            <input type="number" name="stock_maximo" class="form-control" value="{{ producto.stock_maximo }}" min="1" required>
                        </div>
                    </div>

                    <div class="alert alert-info">
                        <small><i class="bi bi-info-circle"></i> Los campos marcados con <span class="text-danger">*</span> son obligatorios</small>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                        <a href="{{ url_for('inventario') }}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// Validación en tiempo real: precio venta >= precio coste
document.getElementById('formEditarProducto').addEventListener('submit', function(e) {
    const precioCoste = parseFloat(document.getElementById('precio_coste_edit').value) || 0;
    const precioVenta = parseFloat(document.getElementById('precio_venta_edit').value) || 0;
    const errorMsg = document.getElementById('error_precio_edit');

    if (precioVenta < precioCoste) {
        e.preventDefault();
        errorMsg.style.display = 'block';
        document.getElementById('precio_venta_edit').classList.add('is-invalid');
        alert('ERROR: El precio de venta no puede ser menor al precio de coste.\n\nNo puedes vender con pérdidas.');
        return false;
    } else {
        errorMsg.style.display = 'none';
        document.getElementById('precio_venta_edit').classList.remove('is-invalid');
    }
});

// Validación en tiempo real mientras escribe
document.getElementById('precio_venta_edit').addEventListener('input', function() {
    const precioCoste = parseFloat(document.getElementById('precio_coste_edit').value) || 0;
    const precioVenta = parseFloat(this.value) || 0;
    const errorMsg = document.getElementById('error_precio_edit');

    if (precioVenta > 0 && precioVenta < precioCoste) {
        errorMsg.style.display = 'block';
        this.classList.add('is-invalid');
    } else {
        errorMsg.style.display = 'none';
        this.classList.remove('is-invalid');
    }
});
</script>

{% endblock %}
